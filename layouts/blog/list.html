{{ define "main" }}
  <h1 class="content-title">Blog</h1>
  <p>
  Welcome to my blog! You can browse it by <a href="/tags/">tags</a>,
  or by year at the end of the page.
  </p>
  {{ .Content }}
  <hr>
  {{ range .Pages.GroupByDate "2006" }}
  <h2>{{ .Key }}</h2>
  <ul>
    {{ range .Pages }}
    <li>{{ .Date.Format "Jan 02, 2006" }} <a href="{{ .Permalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
{{ end }}
