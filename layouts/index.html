{{ define "main" }}
  <h1 class="content-title">{{ .Title }}</h1>
  {{ .Content }}

  <h2>Recent Posts</h2>
  <ul>
    {{- range (where site.RegularPages "Section" "blog" | first 5) }}
    <li>{{ .Date.Format "Jan 02, 2006" }} <a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
{{ end }}
